# Include this file from the nginx http/server block for earth-innovators.cloud.
# If a server/location block already defines client_max_body_size, the more
# specific value wins, so keep this value at the same level as the site config
# or higher than any existing lower limit.

client_max_body_size 64m;
client_body_timeout 120s;
client_body_buffer_size 512k;
